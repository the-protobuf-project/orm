name: Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  test:
    name: Test (Go)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout orm
        uses: actions/checkout@v7
        with:
          path: orm

      # orm/go.mod has local `replace` directives for
      # opentelementry-go (telemetry.v1's Go stubs, pending a BSR/module
      # publish) and runtime-go/telemetry (the Meter contract generated code
      # binds to, not published yet either) — both point at ../<repo>
      # relative to orm, so CI checks them out as true siblings, matching
      # local development. Drop these two checkouts (and go.mod's replaces)
      # once both are published for real.
      - name: Checkout opentelementry (for the opentelementry-go replace)
        uses: actions/checkout@v7
        with:
          repository: the-protobuf-project/opentelementry
          path: opentelementry

      - name: Checkout runtime-go (for the runtime-go/telemetry replace)
        uses: actions/checkout@v7
        with:
          repository: the-protobuf-project/runtime-go
          path: runtime-go

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: orm/go.mod

      - name: Download dependencies
        working-directory: orm
        run: go mod download

      - name: Test
        working-directory: orm
        run: go test -race ./...

  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
    steps:
      - name: Checkout orm
        uses: actions/checkout@v7
        with:
          path: orm

      - name: Checkout opentelementry (for the opentelementry-go replace)
        uses: actions/checkout@v7
        with:
          repository: the-protobuf-project/opentelementry
          path: opentelementry

      - name: Checkout runtime-go (for the runtime-go/telemetry replace)
        uses: actions/checkout@v7
        with:
          repository: the-protobuf-project/runtime-go
          path: runtime-go

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: orm/go.mod

      - name: Build plugin binary
        working-directory: orm
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -ldflags "-s -w" -o /dev/null ./plugin/cmd/protoc-gen-orm
