syntax = "proto3";

// Package bookstore.v1 is the sample proto used to demonstrate orm output.
// Run `buf generate --template buf.gen.example.yaml` from the repo root.
package bookstore.v1;

import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "google/protobuf/timestamp.proto";
import "orm/v1/annotations.proto";

option java_multiple_files = true;
option java_outer_classname = "BookstoreProto";
option java_package = "com.bookstore.v1";
// Files in this package declare the same datasource name, so bookstore.proto
// and inventory.proto merge into one bookstore_db schema tree.
option (orm.v1.datasource) = {
  database: "bookstore_db"
  provider: "postgres"
  url: "postgresql://user:pass@localhost:5432/bookstore_db"
};

// Author is a top-level resource. Inferred table: bookstore_v1.authors.
// id: ID_STRATEGY_ULID synthesizes a generated `id` PK and demotes the AIP
// resource name to a UNIQUE lookup column; timestamps adds created_at/updated_at.
message Author {
  option (google.api.resource) = {
    type: "bookstore.v1/Author"
    pattern: "authors/{author}"
    singular: "author"
    plural: "authors"
  };
  option (orm.v1.table) = {
    id: ID_STRATEGY_ULID
    timestamps: true
  };

  // name is the AIP resource name; UNIQUE NOT NULL lookup key (id is the PK).
  string name = 1 [(google.api.field_behavior) = IDENTIFIER];

  // display_name is REQUIRED → NOT NULL; string → VARCHAR(255) default.
  string display_name = 2 [(google.api.field_behavior) = REQUIRED];

  // bio is free-form; override the VARCHAR(255) default to unbounded TEXT, nullable.
  string bio = 3 [(orm.v1.column) = {type: "TEXT"}];
}

// Book is a resource nested under Author. Inferred table: bookstore_v1.books.
message Book {
  option (google.api.resource) = {
    type: "bookstore.v1/Book"
    pattern: "authors/{author}/books/{book}"
    singular: "book"
    plural: "books"
  };

  // Extra composite index: (author_id, published_year) for timeline queries.
  option (orm.v1.table) = {
    indexes: [
      {
        columns: [
          "author_id",
          "published_year"
        ]
        index: "idx_books_author_year"
      }
    ]
  };

  // span_prefix demonstrates overriding the generated telemetry span name
  // (takes effect only with the telemetry opt); defaults to "bookstore_v1.Book".
  option (orm.v1.telemetry) = {span_prefix: "bookstore.Book"};

  // name: IDENTIFIER → PRIMARY KEY, VARCHAR(255).
  string name = 1 [(google.api.field_behavior) = IDENTIFIER];

  // title: REQUIRED NOT NULL; max_length caps the VARCHAR provider-neutrally.
  string title = 2 [
    (google.api.field_behavior) = REQUIRED,
    (orm.v1.column) = {max_length: 500}
  ];

  // author_id references Author; orm infers the FOREIGN KEY, aligns the
  // column type with the referenced PK (CHAR(26) ULID), and applies CASCADE.
  string author_id = 3 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {type: "bookstore.v1/Author"},
    (orm.v1.column) = {on_delete: REFERENTIAL_ACTION_CASCADE}
  ];

  // isbn must be globally unique; custom fixed-width type.
  string isbn = 4 [(orm.v1.column) = {
    type: "VARCHAR(13)"
    unique: true
  }];

  // published_year is a plain integer column; nullable.
  int32 published_year = 5;

  // internal_notes exists only in the proto contract; excluded from the DB.
  string internal_notes = 6 [(orm.v1.column) = {skip: true}];

  // genre demonstrates proto enum → database enum generation, and — with the
  // telemetry opt — labels every traced Create/Update span with its value
  // (low-cardinality, so it's safe as a span attribute).
  Genre genre = 7 [
    (google.api.field_behavior) = REQUIRED,
    (orm.v1.telemetry_field) = {label: true}
  ];

  // create_time is set by the database on insert.
  google.protobuf.Timestamp create_time = 8 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (orm.v1.column) = {default_value: "now()"}
  ];
}

// Genre classifies a book's literary category.
enum Genre {
  // Default value; the genre has not been specified.
  GENRE_UNSPECIFIED = 0;

  // Fictional works: novels, short stories.
  GENRE_FICTION = 1;

  // Non-fiction works: biographies, essays, reference.
  GENRE_NON_FICTION = 2;

  // Science fiction works.
  GENRE_SCI_FI = 3;

  // Fantasy works.
  GENRE_FANTASY = 4;
}
