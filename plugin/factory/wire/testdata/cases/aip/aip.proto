syntax = "proto3";

package aip.v1;

import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "google/protobuf/timestamp.proto";

option go_package = "example.com/test/gen;aipv1";
option java_multiple_files = true;
option java_outer_classname = "AipProto";
option java_package = "com.aip.v1";

// Document exercises the AIP-148/164 system fields: create_time/update_time
// become auto-managed audit timestamps, delete_time a nullable indexed
// soft-delete marker, and uid a UNIQUE server-assigned id — all with no orm
// annotation.
message Document {
  option (google.api.resource) = {
    type: "aip.v1/Document"
    pattern: "documents/{document}"
    singular: "document"
    plural: "documents"
  };

  // Resource name; the AIP identifier.
  string name = 1 [(google.api.field_behavior) = IDENTIFIER];

  // uid is the server-assigned unique id (AIP-148).
  string uid = 2 [(google.api.field_behavior) = OUTPUT_ONLY];

  // title is an ordinary required field.
  string title = 3 [(google.api.field_behavior) = REQUIRED];

  // create_time is set by the server on creation (AIP-148).
  google.protobuf.Timestamp create_time = 4 [(google.api.field_behavior) = OUTPUT_ONLY];

  // update_time is maintained by the server on every write (AIP-148).
  google.protobuf.Timestamp update_time = 5 [(google.api.field_behavior) = OUTPUT_ONLY];

  // delete_time marks a soft-deleted row when set (AIP-164).
  google.protobuf.Timestamp delete_time = 6 [(google.api.field_behavior) = OUTPUT_ONLY];
}
