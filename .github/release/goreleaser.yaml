version: 2
project_name: protoc-gen-orm

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: protoc-gen-orm
    binary: protoc-gen-orm
    main: ./plugin/cmd/protoc-gen-orm
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: protoc-gen-orm-archive
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}amd64
      {{- else if eq .Arch "arm64" }}arm64
      {{- else }}{{ .Arch }}{{ end }}
    files:
      - LICENSE
      - README.md
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: '{{ incpatch .Version }}-next'

changelog:
  sort: asc
  use: github
  groups:
    - title: Features
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: 'Bug Fixes'
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: 'Performance Improvements'
      regexp: '^.*?perf(\([[:word:]]+\))??!?:.+$'
      order: 2
    - title: Others
      order: 999
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - typo

# Homebrew cask, generated and committed to the tap on each release. The url +
# sha256 for every platform are filled in automatically from the archives below,
# so there is no checksum to hand-maintain (this is what makes the removed,
# hand-written Formula/protoc-gen-orm.rb redundant).
homebrew_casks:
  - name: protoc-gen-orm
    repository:
      owner: the-protobuf-project
      name: homebrew-tap
      token: '{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}'
    directory: Casks
    homepage: 'https://github.com/the-protobuf-project/orm'
    description: 'Protoc plugin generating Prisma, GORM & SQL schemas from Protobuf + AIP annotations'
    ids:
      - protoc-gen-orm-archive
    binaries:
      - protoc-gen-orm
    url:
      verified: 'github.com/the-protobuf-project/orm/'
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/protoc-gen-orm"]
          end

release:
  github:
    owner: the-protobuf-project
    name: orm
  draft: false
  prerelease: auto
  name_template: 'v{{.Version}}'
  header: |
    ## What's New in v{{.Version}}

    `protoc-gen-orm` generates Prisma, GORM, and SQL database schemas
    from your Protobuf definitions. Download the binary for your platform below.

    ### Installation

    #### Homebrew
    ```bash
    brew install the-protobuf-project/tap/protoc-gen-orm
    ```

    #### Manual (macOS / Linux)
    ```bash
    # Pick your platform, e.g. darwin_arm64 / linux_amd64
    curl -LO https://github.com/the-protobuf-project/orm/releases/download/v{{.Version}}/protoc-gen-orm_{{.Version}}_darwin_arm64.tar.gz
    tar -xzf protoc-gen-orm_{{.Version}}_darwin_arm64.tar.gz
    sudo mv protoc-gen-orm /usr/local/bin/
    ```

    Then reference it from `buf.gen.yaml`:
    ```yaml
    plugins:
      - local: protoc-gen-orm
        out: generated
        opt: [target=prisma]   # prisma | gorm | sql
    ```
