name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout orm
        uses: actions/checkout@v7
        with:
          path: orm
          fetch-depth: 0

      # go.mod has local `replace` directives for opentelementry-go
      # (telemetry.v1's Go stubs) and runtime-go/telemetry (the Meter
      # contract generated code binds to) — neither published yet, both
      # resolved via ../<repo> relative to orm. goreleaser's before-hooks run
      # `go mod tidy`/`go test ./...`, so these need to be true siblings here
      # too, matching local development. Drop both checkouts (and the two
      # go.mod replaces) once each is published for real.
      - name: Checkout opentelementry (for the opentelementry-go replace)
        uses: actions/checkout@v7
        with:
          repository: the-protobuf-project/opentelementry
          path: opentelementry

      - name: Checkout runtime-go (for the runtime-go/telemetry replace)
        uses: actions/checkout@v7
        with:
          repository: the-protobuf-project/runtime-go
          path: runtime-go

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: orm/go.mod

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: '~> v2'
          workdir: orm
          args: release --clean --config .github/release/goreleaser.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PAT with repo scope, add at: Settings → Secrets → Actions
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
