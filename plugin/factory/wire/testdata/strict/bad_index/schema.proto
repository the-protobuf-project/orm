syntax = "proto3";

// Package strictidx.v1 defines an index over a column that does not exist, so
// validateIndexes records a warning (an error under --strict).
package strictidx.v1;

import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "orm/v1/annotations.proto";

option java_multiple_files = true;
option java_outer_classname = "SchemaProto";
option java_package = "com.strictidx.v1";
option (orm.v1.datasource) = {
  database: "strictidx_db"
  provider: "postgres"
  schema: "public"
};

// Gadget declares an index over a column that does not exist.
message Gadget {
  option (google.api.resource) = {
    type: "strictidx.v1/Gadget"
    pattern: "gadgets/{gadget}"
    singular: "gadget"
    plural: "gadgets"
  };
  option (orm.v1.table) = {
    indexes: [
      {
        columns: ["nonexistent_column"]
      }
    ]
  };

  // name: IDENTIFIER → PRIMARY KEY.
  string name = 1 [(google.api.field_behavior) = IDENTIFIER];

  // label is an ordinary string column.
  string label = 2;
}
